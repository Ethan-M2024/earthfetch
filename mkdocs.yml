site_name: earthfetch
site_description: Analysis-ready Earth data in one line. Zero API keys.
site_url: https://ethan-m2024.github.io/earthfetch/
repo_url: https://github.com/Ethan-M2024/earthfetch
repo_name: Ethan-M2024/earthfetch
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guide:
      - AOIs: aois.md
      - Data sources: sources.md
      - Time series & analysis: analysis.md
  - API reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
